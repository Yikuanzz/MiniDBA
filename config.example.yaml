# 复制为 config.yaml 后修改；勿将含真实密钥的文件提交入库。

secret_key: "请更换为足够长的随机串"

listen: "127.0.0.1:18080"
readonly: true

# 可选：挂在反代子路径时填写对外前缀（如 Nginx location /dba/ 且 proxy_pass 带尾斜杠剥离前缀）。
# 与进程内路由无关，仅影响重定向、页面链接与 Cookie Path。示例：base_path: "/dba"
# base_path: "/dba"

# 可选：查询上限与分页（省略则用默认 100 / 50 / 100）
# max_result_rows: 100
# page_size: 50
# max_page_size: 100

databases:
  - name: prod
    dsn: "user:pass@tcp(127.0.0.1:3306)/appdb"
