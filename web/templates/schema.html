{{define "content"}}
<h1 class="page-title">表结构 · {{.SchemaTable}}</h1>
<p class="page-sub"><a href="{{.Base}}/tables">返回表列表</a> · <a href="{{.Base}}/browse?table={{.SchemaTable}}">浏览数据</a></p>

<div class="card">
  <div class="card__header">DESCRIBE</div>
  <div class="card__body" style="padding-top:0">
    <div class="table-scroll">
      <table class="data-table">
        <thead><tr>{{range .Describe.Columns}}<th>{{.}}</th>{{end}}</tr></thead>
        <tbody>
          {{range .Describe.Rows}}
          <tr>{{range .}}<td>{{.}}</td>{{end}}</tr>
          {{end}}
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="card">
  <div class="card__header">SHOW CREATE TABLE</div>
  <div class="card__body">
    <pre class="textarea sql-ddl-block">{{.CreateSQL}}</pre>
  </div>
</div>
<script>
(function () {
  var maxTitleLen = 4000;
  document.querySelectorAll(".data-table tbody td").forEach(function (td) {
    var t = td.textContent;
    if (!t || t.length > maxTitleLen) return;
    if (td.scrollHeight > td.clientHeight + 1 || td.scrollWidth > td.clientWidth + 1) {
      td.title = t;
    }
  });
})();
</script>
{{end}}
