{{define "appbar"}}
<header class="app-bar">
  <div class="app-bar__brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <ellipse cx="12" cy="6" rx="8" ry="3" stroke="currentColor" stroke-width="1.5" />
      <path d="M4 6v6c0 1.7 3.6 3 8 3s8-1.3 8-3V6" stroke="currentColor" stroke-width="1.5" />
      <path d="M4 12v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6" stroke="currentColor" stroke-width="1.5" />
    </svg>
    <span>MiniDBA</span>
  </div>
  <form method="post" action="{{.Base}}/switch-db" class="app-bar__field" style="margin:0;display:flex;align-items:center;gap:8px">
    <input type="hidden" name="csrf_token" value="{{.CSRF}}" />
    <label for="conn">当前连接</label>
    <select id="conn" name="conn" aria-label="选择数据库连接" onchange="this.form.submit()">
      {{range .Databases}}
      <option value="{{.Name}}" {{if eq $.ConnName .Name}}selected{{end}}>{{.Name}}</option>
      {{end}}
    </select>
  </form>
  {{if .Readonly}}<span class="chip chip--readonly" style="margin-left:4px" title="只读模式">只读</span>{{end}}
  <div class="app-bar__spacer"></div>
  <a href="{{.Base}}/logout" class="app-bar__link">退出</a>
</header>
{{end}}
