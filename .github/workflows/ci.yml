name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go mod verify
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Verify offline static assets
        run: go run ./scripts/check_offline_urls.go
